name: Build and Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Show content.json status
        run: |
          ls -lah
          test -f content.json
          wc -c content.json
          sed -n '1,20p' content.json

      - name: Validate content.json
        run: |
          python -m json.tool content.json > /dev/null

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build site
        run: python build.py

      - name: Verify output files
        run: |
          test -f output/index.html
          test -f output/404.html
          test -f output/robots.txt
          test -f output/sitemap.xml
          test -f output/llms.txt

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
